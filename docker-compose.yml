services:
  meetscribe:
    image: meeting-scribe-web
    build: .
    ports:
      - "7899:7899"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    networks:
      - meetscribe-net
    restart: unless-stopped

  api:
    image: meeting-scribe-api
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - meetscribe_data:/data
    environment:
      - DATA_DIR=/data
      - PORT=3001
    networks:
      - meetscribe-net
    restart: unless-stopped

networks:
  meetscribe-net:
    name: meetscribe-net
    driver: bridge

volumes:
  meetscribe_data:
    driver: local
